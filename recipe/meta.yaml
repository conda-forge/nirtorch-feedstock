{% set name = "nirtorch" %}
{% set version = "2.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nirtorch-{{ version }}.tar.gz
  sha256: 6ed4afaf2eef0b125a8355fddb5adadcee17695083f25f93eac4d29143bd6701

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - pytorch
    - nir

test:
  imports:
    - nirtorch
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Neuromorphic Intermediate Representation
  license: BSD-3-Clause
  license_file: LICENSE
  home: https://github.com/neuromorphs/NIRTorch/

extra:
  recipe-maintainers:
    - Tobias-Fischer
